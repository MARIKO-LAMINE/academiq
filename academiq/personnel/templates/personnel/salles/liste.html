{% extends 'base_personnel.html' %}{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-building me-2 text-primary"></i>Salles</h4>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalAjout"><i class="bi bi-plus-circle me-1"></i>Nouvelle salle</button>
</div>
<div class="card"><div class="card-body p-0"><table class="table table-hover align-middle mb-0">
    <thead class="table-dark"><tr><th>Nom</th><th>Capacite</th><th>Type</th><th>Actions</th></tr></thead>
    <tbody>{% for s in salles %}<tr><td class="fw-semibold">{{ s.nom }}</td><td>{{ s.capacite }}</td><td>{{ s.type_salle }}</td>
    <td><div class="d-flex gap-1"><a href="{% url 'personnel:modifier_salle' s.pk %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
    <a href="{% url 'personnel:supprimer_salle' s.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></div></td></tr>
    {% empty %}<tr><td colspan="4" class="text-center text-muted py-4">Aucune salle.</td></tr>{% endfor %}</tbody>
</table></div></div>
<div class="modal fade" id="modalAjout" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-header bg-primary text-white"><h6 class="modal-title">Nouvelle salle</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
    <form method="post"><div class="modal-body">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label fw-semibold small">{{ field.label }}</label>{{ field }}</div>{% endfor %}</div>
    <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annuler</button><button type="submit" class="btn btn-primary btn-sm">Creer</button></div></form>
</div></div></div>{% endblock %}
