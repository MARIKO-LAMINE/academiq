{% extends 'base_personnel.html' %}{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card">
    <div class="card-header bg-primary text-white"><h6 class="mb-0">{{ titre }}</h6></div>
    <div class="card-body"><form method="post">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label fw-semibold small">{{ field.label }}</label>{{ field }}</div>{% endfor %}
    <div class="d-flex gap-2"><button type="submit" class="btn btn-primary btn-sm">Enregistrer</button><a href="{% url 'personnel:gestion_classes' %}" class="btn btn-outline-secondary btn-sm">Annuler</a></div>
    </form></div></div></div></div>{% endblock %}
