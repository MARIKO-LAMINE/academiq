{% extends 'base_personnel.html' %}
{% block title %}Confirmer la suppression{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle me-2"></i>Confirmer la suppression
            </div>
            <div class="card-body">
                <p>Êtes-vous sûr de vouloir supprimer <strong>{{ type }}</strong> : <strong>{{ objet }}</strong> ?</p>
                <p class="text-danger small">Cette action est irréversible.</p>
                <div class="d-flex gap-2">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Supprimer
                        </button>
                    </form>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
