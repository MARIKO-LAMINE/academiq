{% extends 'base_personnel.html' %}
{% block title %}Nouveau message — ACADEMIQ{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'personnel:messagerie' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0">Nouveau message</h4>
</div>
{% include 'partials/messages.html' %}
<div class="card border-0" style="max-width:640px">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold small">Destinataire</label>
                <select name="destinataire" class="form-select" required>
                    <option value="">— Choisir un destinataire —</option>
                    {% for p in destinataires %}
                    <option value="{{ p.pk }}">{{ p.get_full_name }} ({{ p.groups.all|join:", " }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Sujet</label>
                <input type="text" name="sujet" class="form-control" required maxlength="150">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Message</label>
                <textarea name="corps" class="form-control" rows="6" required></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send me-1"></i>Envoyer
                </button>
                <a href="{% url 'personnel:messagerie' %}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
