<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ACADEMIQ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <style>
        :root {
            --aq-primary: #1a3a5c;
            --aq-accent:  #f0a500;
        }
        body { background-color: #f4f6f9; }
        .navbar-academiq { background-color: var(--aq-primary); }
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #1e2d3d;
        }
        .sidebar .nav-link { color: #adb5bd; border-radius: .375rem; }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active { background-color: rgba(255,255,255,.08); color: #fff; }
        .sidebar .nav-link i { width: 1.25rem; text-align: center; }
        .badge-role { background-color: var(--aq-accent); color: #1a1a1a; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .table thead th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

{% include 'partials/navbar.html' %}

<div class="container-fluid">
    <div class="row">
        {% block sidebar %}{% endblock %}
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            {% include 'partials/messages.html' %}
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
